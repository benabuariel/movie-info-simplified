version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=django-insecure-kzefqv!3+4))9+i2qp)qporv@-k5ctfw!o1*_&071mluthj*c2
      - DEBUG=True
      - DATABASE_URL=postgres://postgres:password@db:5432/movie_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app  # Hot reload for development
    depends_on:
      - db
      - redis
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 movie_info_simplified.wsgi:application"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: movie_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
