<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>IMDb Search</title>
    <link rel="stylesheet"
          href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        #search-box { width: 300px; padding: 0.5rem; }
        #movie-card { margin-top: 1.5rem; border: 1px solid #ddd; padding: 1rem; max-width: 600px; }
        #movie-card h2 { margin-top: 0; }
        .label { font-weight: bold; }
    </style>
</head>
<body>
    <h1>Movie search</h1>

    <input id="search-box" type="text" placeholder="Type a movie title...">

    <div id="movie-card" style="display:none;">
        <h2 id="movie-title"></h2>
        <p><span class="label">Rating:</span> <span id="movie-rating"></span></p>
        <p><span class="label">Rank:</span> <span id="movie-rank"></span></p>
        <p><span class="label">Directors:</span> <span id="movie-directors"></span></p>
        <p><span class="label">Producers:</span> <span id="movie-producers"></span></p>
        <p><span class="label">Top actors:</span> <span id="movie-cast"></span></p>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
            integrity="sha256-/xUj+3OJ+Y3VSW3k3..." crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"
            integrity="sha256-lYmC..." crossorigin="anonymous"></script>

    <script>
        $(function() {
            $("#search-box").autocomplete({
                source: "{% url 'autocomplete' %}",
                minLength: 2,
                select: function(event, ui) {
                    // ui.item.id comes from autocomplete JSON
                    fetchMovie(ui.item.id);
                }
            });
        });

        function fetchMovie(imdbId) {
            fetch("/movie/" + imdbId + "/")
                .then(response => response.json())
                .then(data => {
                    $("#movie-title").text(data.title + " (" + data.year + ")");
                    $("#movie-rating").text(data.rating ?? "N/A");
                    $("#movie-rank").text(data.rank ?? "N/A");
                    $("#movie-directors").text((data.directors || []).join(", "));
                    $("#movie-producers").text((data.producers || []).join(", "));
                    $("#movie-cast").text((data.cast || []).slice(0, 5).join(", "));
                    $("#movie-card").show();
                })
                .catch(err => {
                    console.error(err);
                    alert("Failed to load movie details");
                });
        }
    </script>
</body>
</html>
